name: ALIO 규정 자동 동기화

# KOICA 현행 규정을 alio.go.kr에서 주기적으로 다시 받아, 변경이 있으면 PR로 올린다.
# main은 브랜치 보호(PR 필수) 대상이라 봇이 직접 push하지 않고 PR을 생성한다.
# 사용자가 PR을 검토·머지하면 반영 — 규정 변경은 사람이 한 번 확인하는 게 안전.

on:
  schedule:
    - cron: "0 0 * * 1"      # 매주 월요일 00:00 UTC (09:00 KST)
  workflow_dispatch:          # 수동 실행 버튼

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: alio-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js (kordoc 실행용)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: ALIO 동기화 실행
        run: python3 alio_sync.py --fresh --no-build
        # --no-build: index.json은 gitignore 대상이라 커밋하지 않는다.
        #             사용자가 git pull 후 build 하거나 update 도구로 재빌드한다.

      - name: 변경분 PR 생성/갱신
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- data/extracted data/sources.json; then
            echo "변경 없음 — 이미 최신 상태"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto/alio-sync"
          COUNT=$(python3 -c "import json;print(json.load(open('data/sources.json')).get('count','?'))")
          git switch -C "$BRANCH"
          git add data/extracted data/sources.json
          git commit -m "chore(sync): ALIO 현행 규정 자동 동기화 (${COUNT}개, $(date -u +%Y-%m-%d))"
          git push -f origin "$BRANCH"
          if [ -z "$(gh pr list --head "$BRANCH" --state open --json number -q '.[].number')" ]; then
            gh pr create --base main --head "$BRANCH" \
              --title "chore(sync): ALIO 현행 규정 자동 동기화" \
              --body "ALIO에서 감지된 KOICA 규정 변경분입니다. 검토 후 머지하세요. (자동 생성)"
            echo "PR 생성 완료"
          else
            echo "기존 PR 갱신(force-push) 완료"
          fi
